version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ame-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ame-secreto
      - POSTGRES_DB=evolution
    ports:
      - 5432:5432
    volumes:
      - ame_db:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: ame-redis
    command: redis-server --appendonly yes
    restart: always

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    depends_on:
      - postgres
      - redis
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=secreto-ame-123
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:ame-secreto@postgres:5432/evolution?schema=public
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution
    ports:
      - 8080:8080
    volumes:
      - evolution_instances:/evolution/instances
    restart: always

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: ame-n8n
    ports:
      - 5678:5678
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Lima
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always

volumes:
  ame_db:
  evolution_instances:
  n8n_data: